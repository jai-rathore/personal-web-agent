version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ENVIRONMENT=development
      - BUILD_SHA=docker-local
      - ALLOWED_ORIGIN=http://localhost:3000
      - CONTENT_DIR=./content
      - TZ=America/Los_Angeles
      # Google Gemini / ADK
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_GENAI_USE_VERTEXAI=FALSE
      - CHAT_MODEL=${CHAT_MODEL:-gemini-3.1-pro}
      - FAST_MODEL=${FAST_MODEL:-gemini-3.1-flash-lite}
      # Google OAuth2 (owner workspace access)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8080/auth/google/callback}
      - OWNER_EMAILS=${OWNER_EMAILS:-jaiadityarathore@gmail.com}
      - JWT_SECRET=${JWT_SECRET}
      # SMTP (feedback)
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@jairathore.com}
      - FEEDBACK_EMAIL=${FEEDBACK_EMAIL:-jaiadityarathore@gmail.com}
    volumes:
      - ./content:/app/content:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
